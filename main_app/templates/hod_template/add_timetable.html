{% extends 'main_app/base.html' %}
{% load static %}

{% block title %}Add Timetable{% endblock title %}
{% block page_title %}➕ Add Timetable{% endblock page_title %}

{% block content %}

<style>
.form-card {
    max-width: 600px;
    margin: auto;
    margin-top: 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 25px;
    border-radius: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}
</style>

<div class="form-card">

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100">
            💾 Save Timetable
        </button>

        <!-- 🔥 BACK BUTTON -->
        <a href="{% url 'view_timetable' %}" 
           class="btn btn-secondary w-100 mt-2">
           ⬅ Back to Timetable
        </a>

    </form>

</div>

{% endblock content %}
