{% extends 'main_app/base.html' %}

{% block page_title %}➕ Add Notice{% endblock %}

{% block content %}

<div class="card p-3">
    <h4>Add Notice</h4>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Upload Notice
        </button>
    </form>
</div>

{% endblock %}
